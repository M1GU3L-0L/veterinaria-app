<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body class="login-body">

<div class="container">
  <h2>🐾 Crear Cuenta</h2>

  <input id="correo" type="email" placeholder="Correo">
  <input id="password" type="password" placeholder="Contraseña (mín. 6 caracteres)">
  <input id="confirmar" type="password" placeholder="Confirmar contraseña">

  <button class="btn-primary" onclick="registrar()">Registrarse</button>

  <p style="margin-top: 15px; font-size: 14px;">
    ¿Ya tienes cuenta? <a href="login.html">Iniciar sesión</a>
  </p>
</div>

<script src="js/register.js"></script>

</body>
</html>
