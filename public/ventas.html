<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Ventas</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .lista li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }
    .lista li div {
      display: flex;
      gap: 6px;
    }
    .lista li button {
      padding: 5px 10px;
      font-size: 13px;
    }
    #form-editar input {
      margin: 4px;
      padding: 6px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 20px;
      background: white;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
  </style>
</head>

<body class="ventas-body">

<div class="topbar">
  <span>🐾 Veterinaria</span>
  <div>
    <button class="btn-secondary" onclick="window.location.href='menu.html'">⬅ Menú</button>
    <button class="btn-danger" onclick="cerrarSesion()">🚪 Cerrar Sesión</button>
  </div>
</div>

<h2>🐾 Registro de Ventas</h2>

<div class="container">
  <input id="producto" placeholder="Producto">
  <input id="precio" type="number" min="1" max="99999999"  placeholder="Precio">
  <input id="cantidad" type="number" min="1" max="1000"  placeholder="Cantidad">
  <input id="fecha" type="date">

  <button class="btn-primary" onclick="crear()">💾 Guardar</button>
  <button class="btn-secondary" onclick="generarPDF()">📄 PDF</button>
</div>

<h3>Ventas Registradas</h3>
<ul id="lista" class="lista"></ul>

<script src="js/ventas.js"></script>
<script>
  function cerrarSesion() {
    if (confirm("¿Deseas cerrar sesión?")) {
      window.location.href = "login.html";
    }
  }
</script>

</body>
</html>
